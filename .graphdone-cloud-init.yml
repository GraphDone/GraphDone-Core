#cloud-config
# GraphDone Multipass VM Cloud-Init Configuration

users:
  - default
  - name: graphdone
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: docker

package_update: true
package_upgrade: true

packages:
  - build-essential
  - curl
  - wget
  - git
  - htop
  - vim
  - net-tools
  - apt-transport-https
  - ca-certificates
  - software-properties-common
  - gnupg
  - lsb-release
  - git
  - curl
  - wget
  - htop
  - vim

runcmd:
  # Update system
  - echo "=== GraphDone VM Setup Starting ==="
  - export DEBIAN_FRONTEND=noninteractive

  # Install Docker
  - echo '=== Installing Docker ==='
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh
  - usermod -aG docker ubuntu
  - systemctl enable docker
  - systemctl start docker
  - echo '=== Installing Docker Compose ==='
  - curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
  - chmod +x /usr/local/bin/docker-compose
  # Install Node.js via NodeSource
  - echo '=== Installing Node.js 20 ==='
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs
  - node --version
  - npm --version
  # Install Tailscale
  - echo '=== Installing Tailscale ==='
  - curl -fsSL https://tailscale.com/install.sh | sh
  - tailscale up --authkey=tskey-auth-kPSPCjePDC21CNTRL-ZADEKcaKCyTvZ3Lqos9LxTxFRdZpzQ9f --accept-routes --accept-dns=false --shields-up=false
  - echo 'Tailscale connected'
  # Clone GraphDone repository
  - echo "=== Cloning GraphDone repository ==="
  - chown -R ubuntu:ubuntu /home/ubuntu
  - su ubuntu -c "git clone -b feature/quick-start-graph-creation https://github.com/GraphDone/GraphDone-Core.git /home/ubuntu/graphdone"
  # Setup GraphDone
  - echo '=== Setting up GraphDone ==='
  - su ubuntu -c 'export HOME=/home/ubuntu && cd /home/ubuntu/graphdone && ./start setup'
  - su ubuntu -c 'export HOME=/home/ubuntu && cd /home/ubuntu/graphdone && npm run db:seed'
  # Install Playwright browsers
  - echo '=== Installing Playwright browsers for E2E testing ==='
  - su ubuntu -c 'export HOME=/home/ubuntu && cd /home/ubuntu/graphdone && npx playwright install --with-deps chromium firefox webkit'
  # Enable and start GraphDone service
  - systemctl daemon-reload
  - systemctl enable graphdone
  - systemctl start graphdone
  - sleep 5
  - systemctl status graphdone --no-pager || true
  # Final setup
  - echo "=== GraphDone VM Setup Complete ==="
  - echo "GraphDone is installed at /home/ubuntu/graphdone"
  - echo "To access - multipass shell graphdone-quick-start"
  - echo "Web UI will be available at http://localhost:3127"
  - echo "GraphQL API at http://localhost:4127/graphql"
  - echo "Neo4j Browser at http://localhost:7474"

write_files:
  - path: /etc/profile.d/graphdone.sh
    content: |
      export GRAPHDONE_HOME=/home/ubuntu/graphdone
      export PATH="$GRAPHDONE_HOME/tools:$PATH"
    permissions: '0644'

  - path: /home/ubuntu/.bashrc
    append: true
    content: |
      # GraphDone Environment
      export GRAPHDONE_HOME=/home/ubuntu/graphdone
      export PATH="$GRAPHDONE_HOME/tools:$PATH"
      alias gd="cd $GRAPHDONE_HOME"
      alias gd-start="cd $GRAPHDONE_HOME && ./start"
      alias gd-stop="cd $GRAPHDONE_HOME && ./start stop"
      alias gd-status="cd $GRAPHDONE_HOME && ./start status"

  - path: /etc/systemd/system/graphdone.service
    content: |
      [Unit]
      Description=GraphDone Development Server
      After=network.target docker.service
      Requires=docker.service

      [Service]
      Type=simple
      User=ubuntu
      WorkingDirectory=/home/ubuntu/graphdone
      ExecStart=/home/ubuntu/graphdone/start dev
      Restart=on-failure
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'
