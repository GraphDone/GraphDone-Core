version: '3.8'

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: graphdone-neo4j
    environment:
      NEO4J_AUTH: neo4j/graphdone_password
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*,apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - graphdone-demo
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "graphdone_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: graphdone-redis-demo
    volumes:
      - redis_data:/data
    networks:
      - graphdone-demo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: graphdone-server
    environment:
      - NODE_ENV=production
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=graphdone_password
      - PORT=4127
      - JWT_SECRET=${JWT_SECRET:-demo_jwt_secret_change_in_production}
      - SESSION_SECRET=${SESSION_SECRET:-demo_session_secret_change_in_production}
      - CLIENT_URL=http://graphdone-ai-01.chocolate-perch.ts.net
      - DEMO_MODE=true
      - DEMO_MAX_USERS=20
      - DEMO_SESSION_TIMEOUT=120
      - DEMO_MAX_GRAPHS=5
      - DEMO_MAX_NODES=50
      - DEMO_ALLOW_SIGNUP=true
      - DEMO_ALLOW_OAUTH=false
    networks:
      - graphdone-demo
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4127/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Route /graphql to the server
      - "traefik.http.routers.demo-api.rule=PathPrefix(`/graphql`) || PathPrefix(`/health`)"
      - "traefik.http.routers.demo-api.priority=20"
      - "traefik.http.routers.demo-api.entrypoints=web"
      - "traefik.http.services.demo-api.loadbalancer.server.port=4127"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        - BASE_PATH=/demo
    container_name: graphdone-web
    environment:
      - NODE_ENV=production
    networks:
      - graphdone-demo
    depends_on:
      - server
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Route /demo to the web app
      - "traefik.http.routers.demo-web.rule=PathPrefix(`/demo`)"
      - "traefik.http.routers.demo-web.priority=10"
      - "traefik.http.routers.demo-web.entrypoints=web"
      # Strip /demo prefix before passing to nginx
      - "traefik.http.middlewares.demo-strip.stripprefix.prefixes=/demo"
      - "traefik.http.routers.demo-web.middlewares=demo-strip"
      - "traefik.http.services.demo-web.loadbalancer.server.port=80"

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  graphdone-demo:
    external: true
